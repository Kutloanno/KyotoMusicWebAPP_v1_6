<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Artist Sign Up - Kyoto Music</title>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #121212; color: #f1f5f9; margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .auth-card { background: #181818; border-radius: 14px; border: 1px solid #282828; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .logo { text-align: center; font-weight: 900; font-size: 2rem; color: #1DB954; letter-spacing: -1px; margin-bottom: 30px; }
        h2 { text-align: center; margin-top: 0; margin-bottom: 25px; font-size: 1.5rem; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 0.85rem; color: #b3b3b3; margin-bottom: 6px; }
        input, select { width: 100%; padding: 12px; background: #121212; border: 1px solid #333; border-radius: 8px; color: white; box-sizing: border-box; font-size: 1rem; }
        input:focus, select:focus { outline: none; border-color: #1DB954; }
        .btn-submit { display: block; width: 100%; padding: 14px; background: #1DB954; color: #000; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 1.1rem; margin-top: 10px; transition: 0.3s; }
        .btn-submit:hover { background: #17a349; }
        .error-msg { background: #7f1d1d; border: 1px solid #ef4444; color: #fca5a5; padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9rem; text-align: center; }
        .links { text-align: center; margin-top: 20px; font-size: 0.9rem; color: #b3b3b3; }
        .links a { color: #1DB954; text-decoration: none; font-weight: bold; }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="logo">KYOTO <span style="color: white;">STUDIO</span></div>
    <h2>Join as an Artist</h2>

    <div th:if="${error}" class="error-msg" th:text="${error}"></div>

    <form th:action="@{/artistsignup}" method="post">
        <div class="form-group">
            <label>Stage Name</label>
            <input type="text" name="name" placeholder="e.g. Kutloano" required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="you@music.com" required>
        </div>

        <div class="form-group">
            <label>Gender</label>
            <!-- VALUES FIXED HERE to pass the SQL check constraint -->
            <select name="gender" required>
                <option value="M">Male</option>
                <option value="F">Female</option>
                <option value="O">Other</option>
            </select>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" name="confirmPassword" required>
        </div>

        <button type="submit" class="btn-submit">Create Account</button>
    </form>

    <div class="links">
        Already have an account? <a href="/artistlogin">Log In</a>
    </div>
</div>

</body>
</html>
