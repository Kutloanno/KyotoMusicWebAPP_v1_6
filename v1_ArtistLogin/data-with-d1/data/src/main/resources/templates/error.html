<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oops! Something went wrong - Kyoto</title>
  <style>
    /* Base Dark Mode */
    body {
        background: #0f172a;
        color: white;
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        text-align: center;
    }
    .error-box {
        background: #1e293b;
        padding: 40px;
        border-radius: 12px;
        width: 90%;
        max-width: 400px;
        border: 1px solid #334155;
        box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    }

    /* Typography & Colors */
    h1 { font-size: 5rem; margin: 0; color: #f87171; text-shadow: 0 4px 15px rgba(248, 113, 113, 0.2); }
    h2 { margin: 10px 0; font-size: 1.5rem; }
    p { color: #94a3b8; line-height: 1.5; margin-bottom: 30px; font-size: 0.95rem; }

    /* Buttons */
    .btn-group { display: flex; flex-direction: column; gap: 10px; }
    .btn {
        width: 100%;
        padding: 12px;
        background: #3b82f6;
        border: none;
        color: white;
        font-weight: bold;
        border-radius: 4px;
        cursor: pointer;
        text-decoration: none;
        box-sizing: border-box;
        transition: background 0.2s;
    }
    .btn:hover { background: #2563eb; }
    .btn-secondary { background: #475569; }
    .btn-secondary:hover { background: #334155; }

    /* Light Mode Overrides */
    body.light-mode { background-color: #f8fafc; color: #0f172a; }
    body.light-mode .error-box { background-color: #ffffff; border-color: #cbd5e1; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
    body.light-mode p { color: #64748b; }
  </style>
</head>
<body>

<div class="error-box">
  <h1 th:text="${status ?: 'Oops!'}">404</h1>
  <h2 th:text="${error ?: 'Unknown Error'}">Page Not Found</h2>

  <p th:text="${message ?: 'The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.'}">
    The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
  </p>

  <div class="btn-group">
    <a href="javascript:history.back()" class="btn btn-secondary">Go Back</a>

    <a href="/" class="btn">Return to Homepage</a>
  </div>
</div>

</body>
</html>
