<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'dark';
            if (theme === 'light') {
                document.documentElement.classList.add('light-mode');
            }
        })();
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8744342952343838"
            crossorigin="anonymous"></script>
    <title>My Store - Kyoto Music</title>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; margin: 0; padding: 0; }
        nav { background: #1e293b; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; }
        .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 35px; }
        .tab { padding: 10px 24px; border-radius: 8px; text-decoration: none; color: #94a3b8; border: 1px solid #334155; font-weight: 600; }
        .tab.active { background: linear-gradient(to right, #8b5cf6, #d946ef); color: white; border-color: transparent; }
        .section-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 20px; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .item-card { background: #1e293b; border-radius: 14px; border: 1px solid #334155; overflow: hidden; }
        .item-card img { width: 100%; aspect-ratio: 1; object-fit: cover; }
        .item-card .info { padding: 15px; }
        .item-card h4 { margin: 0 0 6px; font-size: 1rem; }
        .item-card .price { color: #a78bfa; font-weight: 700; font-size: 1.1rem; }
        .item-card .stock { font-size: 0.78rem; color: #64748b; margin-top: 4px; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; margin-top: 6px; }
        .badge-merch { background: #0f4c81; color: #93c5fd; }
        .badge-music { background: #3b1f6b; color: #c4b5fd; }
        .form-panel { background: #1e293b; border-radius: 16px; border: 1px solid #334155; padding: 30px; margin-bottom: 40px; }
        .form-panel h3 { margin-top: 0; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
        label { display: block; font-size: 0.85rem; color: #94a3b8; margin-bottom: 6px; }
        input, select, textarea { width: 100%; padding: 11px 14px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: white; box-sizing: border-box; font-size: 0.95rem; }
        textarea { resize: vertical; min-height: 80px; }
        .btn { padding: 12px 24px; border-radius: 10px; font-weight: 700; cursor: pointer; border: none; font-size: 0.95rem; }
        .btn-primary { background: linear-gradient(to right, #8b5cf6, #d946ef); color: white; }
        .btn-danger { background: #7f1d1d; color: #fca5a5; }
        .btn-sm { padding: 7px 14px; border-radius: 6px; font-size: 0.82rem; }
        .action-row { display: flex; gap: 8px; margin-top: 10px; }
        .success-msg { background: #064e3b; border: 1px solid #10b981; color: #6ee7b7; padding: 12px 18px; border-radius: 8px; margin-bottom: 20px; }
        .error-msg { background: #7f1d1d; border: 1px solid #ef4444; color: #fca5a5; padding: 12px 18px; border-radius: 8px; margin-bottom: 20px; }
        /* ========================================= */
        /* 📱 MOBILE & ☀️ LIGHT MODE ULTIMATE CSS    */
        /* ========================================= */

        /* Mobile Squeeze Fixes */
        @media (max-width: 768px) {
            .container { padding: 20px 15px; }
            nav { flex-direction: column; gap: 15px; padding: 15px; text-align: center; }
            nav div { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; align-items: center; }
            .form-row, .form-row-3, .card-grid, .product-grid, .event-grid { grid-template-columns: 1fr; gap: 15px; }
            .cart-item, .event-card, .ticket-item { flex-direction: column; align-items: flex-start; }
            .event-card img, .product-card img { width: 100%; height: auto; aspect-ratio: 16/9; }
            .t-right { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        }

        /* Light Mode Overrides */
        body.light-mode { background-color: #f8fafc; color: #0f172a; }
        body.light-mode nav { background-color: #ffffff; border-bottom: 1px solid #e2e8f0; color: #0f172a; }
        body.light-mode nav a { color: #475569; }
        body.light-mode nav a:hover { color: #1DB954; }
        body.light-mode .product-card, body.light-mode .event-card, body.light-mode .cart-item, body.light-mode .cart-summary,
        body.light-mode .form-panel, body.light-mode .item-card, body.light-mode .ticket-list { background-color: #ffffff; border-color: #cbd5e1; }
        body.light-mode input, body.light-mode select, body.light-mode textarea { background-color: #f1f5f9; border-color: #cbd5e1; color: #0f172a; }
        body.light-mode .p-desc, body.light-mode p, body.light-mode label { color: #64748b; }
        body.light-mode .price, body.light-mode .p-price, body.light-mode .event-title, body.light-mode .item-title, body.light-mode .day { color: #0f172a; }
        body.light-mode .date-box, body.light-mode .qty, body.light-mode .ticket-count, body.light-mode .event-date-box { background-color: #f1f5f9; border-color: #cbd5e1; }
        body.light-mode .ticket-item { border-bottom-color: #cbd5e1; }
    
        /* Extra Light Mode Overrides */
        body.light-mode .playlist-card, body.light-mode .song-card, body.light-mode .create-section, body.light-mode .recommended-section, body.light-mode .stat-card, body.light-mode .album-card, body.light-mode .song-item, body.light-mode .settings-card { background-color: #ffffff !important; border: 1px solid #cbd5e1 !important; color: #0f172a !important; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05) !important; }
        body.light-mode .playlist-card:hover, body.light-mode .song-card:hover, body.light-mode .album-card:hover, body.light-mode .song-item:hover { background-color: #f1f5f9 !important; }
        body.light-mode .playlist-card a, body.light-mode .album-card, body.light-mode .btn-logout { color: #475569 !important; }
        body.light-mode #theme-toggle { background: rgba(255,255,255,0.85) !important; border-color: rgba(15,23,42,0.15) !important; color: #0f172a !important; box-shadow: 0 4px 15px rgba(15,23,42,0.15) !important; }
</style>
</head>
<body>
<nav>
    <div style="font-size: 1.5rem; font-weight: 900; letter-spacing: -1px;">KYOTO <span style="color:#a78bfa;">STUDIO</span></div>
    <div style="display: flex; align-items: center;">
        <button id="theme-toggle" onclick="toggleTheme()" style="background:none; border:none; font-size:1.2rem; cursor:pointer; margin-right:20px; outline:none; transition:transform 0.2s;">🌙</button>
        <a th:href="@{/artistdashboard(artistId=${artistId})}" style="color:#94a3b8; margin-right: 20px; text-decoration: none;">Dashboard</a>
        <a th:href="@{/artist/events(artistId=${artistId})}" style="color:#94a3b8; margin-right: 20px; text-decoration: none;">Events</a>
        <a th:href="@{/artist/settings(artistId=${artistId})}" style="color:#94a3b8; margin-right: 20px; text-decoration: none;">Settings</a>
        <a href="/artistlogin" style="color:#f87171; font-weight:bold; text-decoration:none;">Logout</a>
    </div>
</nav>

<div class="container">
    <h2 style="font-size: 2rem; margin-bottom: 6px;">My Store</h2>
    <p style="color:#64748b; margin-bottom: 30px;">Sell merch, exclusive tracks, and more directly to your fans.</p>

    <div th:if="${success}" class="success-msg" th:text="${success}"></div>
    <div th:if="${error}" class="error-msg" th:text="${error}"></div>

    <div class="form-panel">
        <h3>+ Add New Product</h3>
        <form th:action="@{/artist/store/add}" method="post" enctype="multipart/form-data">
            <input type="hidden" name="artistId" th:value="${artistId}">
            <div class="form-row">
                <div>
                    <label>Product Name</label>
                    <input type="text" name="name" placeholder="e.g. Limited Edition T-Shirt" required>
                </div>
                <div>
                    <label>Price (ZAR)</label>
                    <input type="number" name="price" step="0.01" min="0.01" placeholder="350.00" required>
                </div>
            </div>
            <div class="form-row">
                <div>
                    <label>Category</label>
                    <select name="category">
                        <option value="Merch">Merch</option>
                        <option value="Music">Exclusive Music</option>
                        <option value="Digital">Digital Download</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div>
                    <label>Stock Quantity</label>
                    <input type="number" name="stock" min="1" placeholder="50" required>
                </div>
            </div>
            <div style="margin-bottom:16px;">
                <label>Description</label>
                <textarea name="description" placeholder="Describe your product..."></textarea>
            </div>
            <div style="margin-bottom:20px;">
                <label>Product Image</label>
                <input type="file" name="productImage" accept="image/*">
            </div>
            <button type="submit" class="btn btn-primary">List Product</button>
        </form>
    </div>

    <div class="section-title">My Listings</div>
    <div th:if="${#lists.isEmpty(products)}" style="color:#64748b; margin-bottom:40px;">No products listed yet.</div>
    <div class="card-grid">
        <div th:each="p : ${products}" class="item-card">
            <img th:if="${p['ImageURL'] != null and p['ImageURL'] != ''}"
                 th:src="@{'/image/' + ${p['ImageURL']}}" alt="Product">
            <img th:if="${p['ImageURL'] == null or p['ImageURL'] == ''}"
                 src="https://via.placeholder.com/300x300/1e293b/a78bfa?text=Product" alt="No Image">
            <div class="info">
                <span class="badge" th:classappend="${p['Category'] == 'Merch'} ? 'badge-merch' : 'badge-music'" th:text="${p['Category']}">Merch</span>
                <h4 th:text="${p['Name']}">Product Name</h4>
                <div class="price" th:text="'R' + ${p['Price']}">R0.00</div>
                <div class="stock" th:text="${p['Stock']} + ' in stock'">0 in stock</div>
                <div class="action-row">
                    <form th:action="@{/artist/store/delete}" method="post">
                        <input type="hidden" name="productId" th:value="${p['ProductID']}">
                        <input type="hidden" name="artistId" th:value="${artistId}">
                        <button type="submit" class="btn btn-danger btn-sm"
                                onclick="return confirm('Remove this product?')">Remove</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    function updateThemeButton() {
        const btn = document.getElementById('theme-toggle');
        if (!btn) return;
        const isLight = document.documentElement.classList.contains('light-mode');
        btn.textContent = isLight ? '☀️' : '🌙';
    }

    function toggleTheme() {
        const isLight = document.documentElement.classList.toggle('light-mode');
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
        if (document.body) {
            document.body.classList.toggle('light-mode', isLight);
        }
        updateThemeButton();
    }

    document.addEventListener('DOMContentLoaded', () => {
        const theme = localStorage.getItem('theme') || 'dark';
        const isLight = theme === 'light';
        document.documentElement.classList.toggle('light-mode', isLight);
        if (document.body) {
            document.body.classList.toggle('light-mode', isLight);
        }
        updateThemeButton();
    });
</script>
</body>
</html>
