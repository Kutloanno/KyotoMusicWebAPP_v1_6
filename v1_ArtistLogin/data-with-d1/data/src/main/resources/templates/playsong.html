<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'dark';
            if (theme === 'light') {
                document.documentElement.classList.add('light-mode');
            }
        })();
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8744342952343838"
            crossorigin="anonymous"></script>
    <title>Now Playing - Kyoto Music</title>
    <style>
        /* 1. DARK THEME BASE */
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: radial-gradient(circle at top, #1e1e2e 0%, #121212 100%);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .player-container {
            width: 100%;
            max-width: 500px;
            padding: 40px;
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        /* 2. COVER ART ANIMATION */
        .cover-wrapper {
            width: 300px;
            height: 300px;
            margin: 0 auto 30px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            transition: transform 0.5s ease;
        }

        .cover-wrapper:hover {
            transform: scale(1.03);
        }

        .cover-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 3. TEXT STYLING */
        h2 { font-size: 1.8rem; margin: 0 0 10px 0; letter-spacing: -0.5px; }
        .artist-name { font-size: 1.1rem; color: #1DB954; font-weight: 600; margin-bottom: 20px; }

        .meta-info {
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 0.8rem;
            color: #b3b3b3;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 4. PLAYER CONTROLS */
        audio {
            width: 100%;
            height: 40px;
            margin-bottom: 25px;
            filter: invert(100%) hue-rotate(180deg) brightness(1.5); /* Modern dark audio look */
        }

        /* 5. BUTTONS */
        .actions { display: flex; flex-direction: column; gap: 12px; }

        .btn {
            padding: 14px;
            border-radius: 50px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .btn-download { background: #1DB954; color: black; }
        .btn-download:hover { background: #1ed760; transform: translateY(-2px); }

        .btn-back { background: transparent; color: #b3b3b3; border: 1px solid #333; }
        .btn-back:hover { color: white; border-color: white; }

        .stats-row {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-around;
            font-size: 0.8rem;
            color: #888;
        }
        .stat b { color: white; display: block; font-size: 1rem; margin-top: 5px; }
        /* ========================================= */
        /* 📱 MOBILE & ☀️ LIGHT MODE ULTIMATE CSS    */
        /* ========================================= */

        /* Mobile Squeeze Fixes */
        @media (max-width: 768px) {
            .container { padding: 20px 15px; }
            nav { flex-direction: column; gap: 15px; padding: 15px; text-align: center; }
            nav div { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; align-items: center; }
            .form-row, .form-row-3, .card-grid, .product-grid, .event-grid { grid-template-columns: 1fr; gap: 15px; }
            .cart-item, .event-card, .ticket-item { flex-direction: column; align-items: flex-start; }
            .event-card img, .product-card img { width: 100%; height: auto; aspect-ratio: 16/9; }
            .t-right { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        }

        /* Light Mode Overrides */
        body.light-mode { background-color: #f8fafc; color: #0f172a; }
        body.light-mode nav { background-color: #ffffff; border-bottom: 1px solid #e2e8f0; color: #0f172a; }
        body.light-mode nav a { color: #475569; }
        body.light-mode nav a:hover { color: #1DB954; }
        body.light-mode .product-card, body.light-mode .event-card, body.light-mode .cart-item, body.light-mode .cart-summary,
        body.light-mode .form-panel, body.light-mode .item-card, body.light-mode .ticket-list { background-color: #ffffff; border-color: #cbd5e1; }
        body.light-mode input, body.light-mode select, body.light-mode textarea { background-color: #f1f5f9; border-color: #cbd5e1; color: #0f172a; }
        body.light-mode .p-desc, body.light-mode p, body.light-mode label { color: #64748b; }
        body.light-mode .price, body.light-mode .p-price, body.light-mode .event-title, body.light-mode .item-title, body.light-mode .day { color: #0f172a; }
        body.light-mode .date-box, body.light-mode .qty, body.light-mode .ticket-count, body.light-mode .event-date-box { background-color: #f1f5f9; border-color: #cbd5e1; }
        body.light-mode .ticket-item { border-bottom-color: #cbd5e1; }
    
        /* Extra Light Mode Overrides */
        body.light-mode .playlist-card, body.light-mode .song-card, body.light-mode .create-section, body.light-mode .recommended-section, body.light-mode .stat-card, body.light-mode .album-card, body.light-mode .song-item, body.light-mode .settings-card { background-color: #ffffff !important; border: 1px solid #cbd5e1 !important; color: #0f172a !important; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05) !important; }
        body.light-mode .playlist-card:hover, body.light-mode .song-card:hover, body.light-mode .album-card:hover, body.light-mode .song-item:hover { background-color: #f1f5f9 !important; }
        body.light-mode .playlist-card a, body.light-mode .album-card, body.light-mode .btn-logout { color: #475569 !important; }
        body.light-mode #theme-toggle { background: rgba(255,255,255,0.85) !important; border-color: rgba(15,23,42,0.15) !important; color: #0f172a !important; box-shadow: 0 4px 15px rgba(15,23,42,0.15) !important; }
</style>
</head>
<body>
<button id="theme-toggle" onclick="toggleTheme()" style="position: fixed; top: 20px; right: 20px; z-index: 9999; background: rgba(15, 23, 42, 0.85); border: 1px solid rgba(255,255,255,0.15); border-radius: 50%; width: 44px; height: 44px; font-size: 1.25rem; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); box-shadow: 0 4px 15px rgba(0,0,0,0.35); transition: all 0.2s ease; outline: none;">🌙</button>

<div class="player-container">
    <div class="cover-wrapper">
        <img th:src="@{'/image/' + ${song['CoverArtURL']}}" alt="Cover Art"
             th:if="${song['CoverArtURL'] != null}">
        <div th:unless="${song['CoverArtURL'] != null}"
             style="background: #333; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 5rem;">
            🎵
        </div>
    </div>

    <h2 th:text="${song['Title']}">Song Title</h2>
    <div class="artist-name" th:text="${song['ArtistName']}">Artist Name</div>

    <div class="meta-info">
        <span th:text="${song['GenreName'] ?: 'Unknown Genre'}">Genre</span>
        <span>•</span>
        <span><span th:text="${song['Duration']}">0</span>s</span>
    </div>

    <div th:if="${song['AudioFileURL'] != null}">
        <audio controls autoplay>
            <source th:src="@{'/stream/' + ${song['AudioFileURL']}}" type="audio/mpeg">
            Your browser does not support audio.
        </audio>
    </div>

    <div class="actions">
        <a th:if="${song['AudioFileURL'] != null}"
           th:href="@{'/download/' + ${song['AudioFileURL']}}"
           class="btn btn-download">
            Download Track ⬇️
        </a>
        <button onclick="history.back()" class="btn btn-back">Go Back</button>
    </div>

    <div class="stats-row">
        <div class="stat">Plays <b th:text="${song['PlayCount'] ?: 0}">0</b></div>
        <div class="stat">Downloads <b th:text="${song['DownloadCount'] ?: 0}">0</b></div>
    </div>
</div>

<script>
    function updateThemeButton() {
        const btn = document.getElementById('theme-toggle');
        if (!btn) return;
        const isLight = document.documentElement.classList.contains('light-mode');
        btn.textContent = isLight ? '☀️' : '🌙';
    }

    function toggleTheme() {
        const isLight = document.documentElement.classList.toggle('light-mode');
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
        if (document.body) {
            document.body.classList.toggle('light-mode', isLight);
        }
        updateThemeButton();
    }

    document.addEventListener('DOMContentLoaded', () => {
        const theme = localStorage.getItem('theme') || 'dark';
        const isLight = theme === 'light';
        document.documentElement.classList.toggle('light-mode', isLight);
        if (document.body) {
            document.body.classList.toggle('light-mode', isLight);
        }
        updateThemeButton();
    });
</script>
</body>
</html>
