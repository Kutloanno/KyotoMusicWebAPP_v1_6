<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Settings - Kyoto</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #121212; color: white; padding: 50px; }
        .settings-card { max-width: 450px; margin: 0 auto; background: #181818; padding: 40px; border-radius: 12px; border: 1px solid #282828; }
        input { width: 100%; padding: 12px; background: #282828; border: 1px solid #444; color: white; border-radius: 4px; margin-bottom: 20px; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; border-radius: 4px; font-weight: bold; cursor: pointer; border: none; }
        .btn-update { background: #1DB954; color: black; }
        .btn-delete { background: transparent; color: #ff4444; border: 1px solid #ff4444; margin-top: 30px; }
        .btn-delete:hover { background: #ff4444; color: white; }
        /* ========================================= */
        /* 📱 MOBILE & ☀️ LIGHT MODE ULTIMATE CSS    */
        /* ========================================= */

        /* Mobile Squeeze Fixes */
        @media (max-width: 768px) {
            .container { padding: 20px 15px; }
            nav { flex-direction: column; gap: 15px; padding: 15px; text-align: center; }
            nav div { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; align-items: center; }
            .form-row, .form-row-3, .card-grid, .product-grid, .event-grid { grid-template-columns: 1fr; gap: 15px; }
            .cart-item, .event-card, .ticket-item { flex-direction: column; align-items: flex-start; }
            .event-card img, .product-card img { width: 100%; height: auto; aspect-ratio: 16/9; }
            .t-right { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        }

        /* Light Mode Overrides */
        body.light-mode { background-color: #f8fafc; color: #0f172a; }
        body.light-mode nav { background-color: #ffffff; border-bottom: 1px solid #e2e8f0; color: #0f172a; }
        body.light-mode nav a { color: #475569; }
        body.light-mode nav a:hover { color: #1DB954; }
        body.light-mode .product-card, body.light-mode .event-card, body.light-mode .cart-item, body.light-mode .cart-summary,
        body.light-mode .form-panel, body.light-mode .item-card, body.light-mode .ticket-list { background-color: #ffffff; border-color: #cbd5e1; }
        body.light-mode input, body.light-mode select, body.light-mode textarea { background-color: #f1f5f9; border-color: #cbd5e1; color: #0f172a; }
        body.light-mode .p-desc, body.light-mode p, body.light-mode label { color: #64748b; }
        body.light-mode .price, body.light-mode .p-price, body.light-mode .event-title, body.light-mode .item-title, body.light-mode .day { color: #0f172a; }
        body.light-mode .date-box, body.light-mode .qty, body.light-mode .ticket-count, body.light-mode .event-date-box { background-color: #f1f5f9; border-color: #cbd5e1; }
        body.light-mode .ticket-item { border-bottom-color: #cbd5e1; }
    </style>
</head>
<body>

<div class="settings-card">
    <h2>Account Settings</h2>
    <form action="/user/update" method="post">
        <input type="hidden" name="listenerId" th:value="${user.ListenerID}">

        <label>Name</label>
        <input type="text" name="name" th:value="${user.Name}" required>

        <label>Password</label>
        <input type="password" name="password" th:value="${user.Password}" required>

        <button type="submit" class="btn btn-update">Update Profile</button>
    </form>

    <form action="/user/delete" method="post" onsubmit="return confirm('This will delete your account and all your playlists forever. Proceed?');">
        <input type="hidden" name="listenerId" th:value="${user.ListenerID}">
        <button type="submit" class="btn btn-delete">Delete My Account</button>
    </form>

    <div style="text-align: center; margin-top: 20px;">
        <a th:href="@{/userDashBoard(listenerId=${user.ListenerID})}" style="color: #888; text-decoration: none;">Back to Dashboard</a>
    </div>
</div>

</body>
</html>
