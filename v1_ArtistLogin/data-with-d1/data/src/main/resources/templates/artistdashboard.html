<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Artist Studio - Kyoto Music</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
            margin: 0;
            padding: 0;
        }

        /* Centered Header / Nav */
        nav {
            background: #1e293b;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Stats Section */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 50px;
        }

        .stat-card {
            background: #1e293b;
            padding: 25px;
            border-radius: 16px;
            border: 1px solid #334155;
            text-align: center;
        }

        .stat-card h3 { font-size: 2.5rem; margin: 10px 0 0; color: #8b5cf6; }

        /* Album Grid */
        .album-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .album-card {
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .album-card:hover { transform: translateY(-5px); border-color: #f472b6; }

        .album-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        /* Song List */
        .song-item {
            background: rgba(30, 41, 59, 0.4);
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #334155;
        }

        .btn { padding: 10px 20px; border-radius: 8px; font-weight: 700; text-decoration: none; cursor: pointer; }
        .btn-add { background: linear-gradient(to right, #8b5cf6, #d946ef); color: white; }
        .btn-play { background: #334155; color: white; }
        .btn-logout { color: #f87171; font-weight: bold; }
    </style>
</head>
<body>

<nav>
    <div style="font-size: 1.5rem; font-weight: 900; letter-spacing: -1px;">KYOTO <span style="color: #a78bfa;">STUDIO</span></div>
    <div>
        <a th:href="@{/artist/settings(artistId=${artistId})}" style="color: #94a3b8; margin-right: 20px; text-decoration: none;">Settings</a>
        <a th:href="@{/artist/store(artistId=${artistId})}" style="color: #94a3b8; margin-right: 20px; text-decoration: none;">🛍️ Store</a>
        <a th:href="@{/artist/events(artistId=${artistId})}" style="color: #94a3b8; margin-right: 20px; text-decoration: none;">🎤 Events</a>
        <a th:href="@{/addSong(artistId=${artistId})}" style="color: white; margin-right: 20px; text-decoration: none;">+ Upload</a>
        <a href="/artistlogin" class="btn-logout">Logout</a>
    </div>
</nav>

<div class="container">
    <div class="welcome-box">
        <h2 style="font-size: 2.5rem;">Welcome, <span th:text="${artistName}">Artist</span></h2>
        <p style="color: #94a3b8;">Manage your music and view performance stats.</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><span>Tracks</span> <h3 th:text="${totalSongs}">0</h3></div>
        <div class="stat-card"><span>Total Plays</span> <h3 th:text="${totalPlays}">0</h3></div>
        <div class="stat-card"><span>Downloads</span> <h3 th:text="${totalDownloads}">0</h3></div>
    </div>

    <h3>My Albums</h3>
    <div class="album-grid">
        <a th:each="album : ${albums}" th:href="@{'/album/' + ${album['AlbumID']}}" class="album-card">
            <img th:src="@{'/image/' + ${album['CoverArtURL']}}" alt="Album Cover">
            <h4 th:text="${album['Title']}">Album Title</h4>
        </a>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h3>Recent Tracks</h3>
        <a th:href="@{/addSong(artistId=${artistId})}" class="btn btn-add">Upload New</a>
    </div>

    <div th:each="song : ${songs}" class="song-item">
        <div>
            <h4 th:text="${song['Title']}" style="margin:0;">Song Title</h4>
            <p style="margin:5px 0 0; font-size: 0.8rem; color: #94a3b8;" th:text="${song['PlayCount']} + ' plays • ' + ${song['GenreName']}"></p>
        </div>
        <a th:href="@{/playSong(songId=${song['SongID']})}" class="btn btn-play">Preview</a>
    </div>
</div>

</body>
</html>
