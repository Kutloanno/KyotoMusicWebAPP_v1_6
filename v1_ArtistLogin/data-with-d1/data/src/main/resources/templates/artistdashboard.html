<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'dark';
            if (theme === 'light') {
                document.documentElement.classList.add('light-mode');
            }
        })();
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8744342952343838"
            crossorigin="anonymous"></script>
    <title>Artist Studio - Kyoto Music</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
            margin: 0;
            padding: 0;
        }

        /* Centered Header / Nav */
        nav {
            background: #1e293b;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Stats Section */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 50px;
        }

        .stat-card {
            background: #1e293b;
            padding: 25px;
            border-radius: 16px;
            border: 1px solid #334155;
            text-align: center;
        }

        .stat-card h3 { font-size: 2.5rem; margin: 10px 0 0; color: #8b5cf6; }

        /* Album Grid */
        .album-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .album-card {
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .album-card:hover { transform: translateY(-5px); border-color: #f472b6; }

        .album-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 12px;
        }

        /* Song List */
        .song-item {
            background: rgba(30, 41, 59, 0.4);
            padding: 15px 25px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #334155;
        }

        .btn { padding: 10px 20px; border-radius: 8px; font-weight: 700; text-decoration: none; cursor: pointer; }
        .btn-add { background: linear-gradient(to right, #8b5cf6, #d946ef); color: white; }
        .btn-play { background: #334155; color: white; }
        .btn-logout { color: #f87171; font-weight: bold; }
        /* ========================================= */
        /* 📱 MOBILE & ☀️ LIGHT MODE ULTIMATE CSS    */
        /* ========================================= */

        /* Mobile Squeeze Fixes */
        @media (max-width: 768px) {
            .container { padding: 20px 15px; }
            nav { flex-direction: column; gap: 15px; padding: 15px; text-align: center; }
            nav div { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; align-items: center; }
            .form-row, .form-row-3, .card-grid, .product-grid, .event-grid { grid-template-columns: 1fr; gap: 15px; }
            .cart-item, .event-card, .ticket-item { flex-direction: column; align-items: flex-start; }
            .event-card img, .product-card img { width: 100%; height: auto; aspect-ratio: 16/9; }
            .t-right { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        }

        /* Light Mode Overrides */
        body.light-mode { background-color: #f8fafc; color: #0f172a; }
        body.light-mode nav { background-color: #ffffff; border-bottom: 1px solid #e2e8f0; color: #0f172a; }
        body.light-mode nav a { color: #475569; }
        body.light-mode nav a:hover { color: #1DB954; }
        body.light-mode .product-card, body.light-mode .event-card, body.light-mode .cart-item, body.light-mode .cart-summary,
        body.light-mode .form-panel, body.light-mode .item-card, body.light-mode .ticket-list { background-color: #ffffff; border-color: #cbd5e1; }
        body.light-mode input, body.light-mode select, body.light-mode textarea { background-color: #f1f5f9; border-color: #cbd5e1; color: #0f172a; }
        body.light-mode .p-desc, body.light-mode p, body.light-mode label { color: #64748b; }
        body.light-mode .price, body.light-mode .p-price, body.light-mode .event-title, body.light-mode .item-title, body.light-mode .day { color: #0f172a; }
        body.light-mode .date-box, body.light-mode .qty, body.light-mode .ticket-count, body.light-mode .event-date-box { background-color: #f1f5f9; border-color: #cbd5e1; }
        body.light-mode .ticket-item { border-bottom-color: #cbd5e1; }
    
        /* Extra Light Mode Overrides */
        body.light-mode .playlist-card, body.light-mode .song-card, body.light-mode .create-section, body.light-mode .recommended-section, body.light-mode .stat-card, body.light-mode .album-card, body.light-mode .song-item, body.light-mode .settings-card { background-color: #ffffff !important; border: 1px solid #cbd5e1 !important; color: #0f172a !important; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05) !important; }
        body.light-mode .playlist-card:hover, body.light-mode .song-card:hover, body.light-mode .album-card:hover, body.light-mode .song-item:hover { background-color: #f1f5f9 !important; }
        body.light-mode .playlist-card a, body.light-mode .album-card, body.light-mode .btn-logout { color: #475569 !important; }
        body.light-mode #theme-toggle { background: rgba(255,255,255,0.85) !important; border-color: rgba(15,23,42,0.15) !important; color: #0f172a !important; box-shadow: 0 4px 15px rgba(15,23,42,0.15) !important; }
</style>
</head>
<body>

<nav>
    <div style="font-size: 1.5rem; font-weight: 900; letter-spacing: -1px;">KYOTO <span style="color: #a78bfa;">STUDIO</span></div>
    <div style="display: flex; align-items: center;">
        <button id="theme-toggle" onclick="toggleTheme()" style="background:none; border:none; font-size:1.2rem; cursor:pointer; margin-right:20px; outline:none; transition:transform 0.2s;">🌙</button>
        <a th:href="@{/artist/settings(artistId=${artistId})}" style="color: #94a3b8; margin-right: 20px; text-decoration: none;">Settings</a>
        <a th:href="@{/artist/store(artistId=${artistId})}" style="color: #94a3b8; margin-right: 20px; text-decoration: none;">🛍️ Store</a>
        <a th:href="@{/artist/events(artistId=${artistId})}" style="color: #94a3b8; margin-right: 20px; text-decoration: none;">🎤 Events</a>
        <a th:href="@{/addSong(artistId=${artistId})}" style="color: white; margin-right: 20px; text-decoration: none;">+ Upload</a>
        <a href="/artistlogin" class="btn-logout">Logout</a>
    </div>
</nav>

<div class="container">
    <div class="welcome-box">
        <h2 style="font-size: 2.5rem;">Welcome, <span th:text="${artistName}">Artist</span></h2>
        <p style="color: #94a3b8;">Manage your music and view performance stats.</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><span>Tracks</span> <h3 th:text="${totalSongs}">0</h3></div>
        <div class="stat-card"><span>Total Plays</span> <h3 th:text="${totalPlays}">0</h3></div>
        <div class="stat-card"><span>Downloads</span> <h3 th:text="${totalDownloads}">0</h3></div>
    </div>

    <h3>My Albums</h3>
    <div class="album-grid">
        <a th:each="album : ${albums}" th:href="@{'/album/' + ${album['AlbumID']}}" class="album-card">
            <img th:src="@{'/image/' + ${album['CoverArtURL']}}" alt="Album Cover">
            <h4 th:text="${album['Title']}">Album Title</h4>
        </a>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h3>Recent Tracks</h3>
        <a th:href="@{/addSong(artistId=${artistId})}" class="btn btn-add">Upload New</a>
    </div>

    <div th:each="song : ${songs}" class="song-item">
        <div>
            <h4 th:text="${song['Title']}" style="margin:0;">Song Title</h4>
            <p style="margin:5px 0 0; font-size: 0.8rem; color: #94a3b8;" th:text="${song['PlayCount']} + ' plays • ' + ${song['GenreName']}"></p>
        </div>
        <a th:href="@{/playSong(songId=${song['SongID']})}" class="btn btn-play">Preview</a>
    </div>
</div>

<script>
    function updateThemeButton() {
        const btn = document.getElementById('theme-toggle');
        if (!btn) return;
        const isLight = document.documentElement.classList.contains('light-mode');
        btn.textContent = isLight ? '☀️' : '🌙';
    }

    function toggleTheme() {
        const isLight = document.documentElement.classList.toggle('light-mode');
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
        if (document.body) {
            document.body.classList.toggle('light-mode', isLight);
        }
        updateThemeButton();
    }

    document.addEventListener('DOMContentLoaded', () => {
        const theme = localStorage.getItem('theme') || 'dark';
        const isLight = theme === 'light';
        document.documentElement.classList.toggle('light-mode', isLight);
        if (document.body) {
            document.body.classList.toggle('light-mode', isLight);
        }
        updateThemeButton();
    });
</script>
</body>
</html>
