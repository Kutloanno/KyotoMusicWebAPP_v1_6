# ---------------------------------------------------------
# SERVER CONFIGURATION
# ---------------------------------------------------------
server.port=8080

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# ---------------------------------------------------------
# FILE UPLOAD LIMITS (Crucial for Music/Images)
# ---------------------------------------------------------
# Spring defaults to 1MB, which will crash your music upload.
# Set these to 50MB to be safe.
# Multipart upload limits (matching original Java EE config)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB
spring.servlet.multipart.file-size-threshold=1MB

# ---------------------------------------------------------
# EMAIL CONFIGURATION (JavaMailSender)
# ---------------------------------------------------------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
# Replace this with the actual Gmail account sending the receipts
spring.mail.username=kyotomusic0swp@gmail.com
# Replace this with the 16-letter App Password from Google settings
spring.mail.password=${MAIL_PASSWORD}
# Tell Spring to actually log in and use TLS encryption
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true